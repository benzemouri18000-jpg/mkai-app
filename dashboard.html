<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>MKAI - AI Stylist</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle at top, #1e293b, #0f172a);
  color: white;
  padding: 30px;
}

.container {
  max-width: 1000px;
  margin: auto;
}

h1 {
  font-size: 38px;
  background: linear-gradient(90deg,#60a5fa,#a78bfa);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.subtitle {
  opacity: 0.7;
  margin-bottom: 25px;
}

.card {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.1);
  padding: 15px;
  border-radius: 18px;
  backdrop-filter: blur(12px);
  margin-top: 12px;
  animation: fadeIn 0.4s ease;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-3px);
  background: rgba(255,255,255,0.12);
}

@keyframes fadeIn {
  from {opacity:0; transform: translateY(10px);}
  to {opacity:1; transform: translateY(0);}
}

button {
  background: linear-gradient(90deg,#3b82f6,#8b5cf6);
  border: none;
  padding: 14px 20px;
  border-radius: 12px;
  color: white;
  cursor: pointer;
  margin-top: 10px;
  font-weight: bold;
}

button:hover {
  opacity: 0.9;
}

input {
  margin-top: 10px;
}

.preview {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-top: 10px;
}

.preview img {
  width: 85px;
  height: 85px;
  object-fit: cover;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.2);
}

.outfit-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
  gap: 15px;
  margin-top: 20px;
}

.item-img {
  width: 100%;
  height: 180px;
  object-fit: cover;
  border-radius: 12px;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<div class="container">

<h1>🧠 MKAI Stylist AI</h1>
<div class="subtitle">Ton styliste intelligent avec IA + visual outfits</div>

<!-- UPLOAD -->
<div class="card">
  <h3>📸 Ton dressing</h3>
  <input type="file" id="upload" multiple accept="image/*">
  <div class="preview" id="preview"></div>
</div>

<button onclick="generateOutfit()">✨ Générer une tenue IA</button>

<div id="result" class="outfit-grid"></div>

</div>

<script>

let uploadedImages = [];

const upload = document.getElementById("upload");
const preview = document.getElementById("preview");

upload.addEventListener("change", (e) => {
  preview.innerHTML = "";
  uploadedImages = [];

  [...e.target.files].forEach(file => {
    const url = URL.createObjectURL(file);
    uploadedImages.push(file);

    const img = document.createElement("img");
    img.src = url;
    preview.appendChild(img);
  });
});

// 🎨 mapping simple vers images (style fashion)
function getImage(item, type) {
  const base = "https://source.unsplash.com/400x400/?";

  if (type === "haut") return base + "hoodie,tshirt,streetwear";
  if (type === "bas") return base + "jeans,pants,streetwear";
  if (type === "chaussures") return base + "sneakers,shoes";
  if (type === "accessoires") return base + "cap,watch,accessories";

  return base + "fashion";
}

async function generateOutfit() {
  const result = document.getElementById("result");
  result.innerHTML = "⏳ IA création de ton outfit...";

  const res = await fetch("/api/generate-outfit", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      style: "streetwear",
      weather: "soleil",
      gender: "homme",
      hasWardrobe: uploadedImages.length > 0
    })
  });

  const data = await res.json();

  if (!data.outfit) {
    result.innerHTML = "Erreur IA ❌";
    console.log(data);
    return;
  }

  const o = data.outfit;

  const items = [
    { t: "Haut", v: o.haut, img: getImage(o.haut,"haut") },
    { t: "Bas", v: o.bas, img: getImage(o.bas,"bas") },
    { t: "Chaussures", v: o.chaussures, img: getImage(o.chaussures,"chaussures") },
    { t: "Accessoires", v: o.accessoires?.join(", "), img: getImage("", "accessoires") }
  ];

  result.innerHTML = "";

  items.forEach((item, i) => {
    setTimeout(() => {
      const div = document.createElement("div");
      div.className = "card";
      div.innerHTML = `
        <img class="item-img" src="${item.img}" />
        <h3>${item.t}</h3>
        <p>${item.v}</p>
      `;
      result.appendChild(div);
    }, i * 150);
  });

}

</script>

</body>
</html>
