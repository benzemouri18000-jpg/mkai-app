<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>MKAI Fashion AI</title>

<style>
body {
  margin: 0;
  font-family: system-ui;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: white;
  padding: 30px;
}

.container {
  max-width: 1000px;
  margin: auto;
}

h1 {
  font-size: 44px;
  background: linear-gradient(90deg,#60a5fa,#a78bfa,#f472b6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

button {
  background: linear-gradient(90deg,#3b82f6,#a855f7);
  border: none;
  padding: 14px 18px;
  border-radius: 12px;
  color: white;
  font-weight: bold;
  cursor: pointer;
  margin-bottom: 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px,1fr));
  gap: 15px;
}

.card {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  padding: 12px;
  border-radius: 16px;
  transition: 0.2s;
}

.card:hover {
  transform: translateY(-5px);
}

.card img {
  width: 100%;
  height: 220px;
  object-fit: cover;
  border-radius: 12px;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<div class="container">

<h1>🧠 MKAI Fashion AI</h1>

<button onclick="generateOutfit()">✨ Générer outfit</button>

<div id="result" class="grid"></div>

</div>

<script>

// 🎯 IMAGES COHÉRENTES (FIXES + VARIÉES)
function getImage(type, value) {

  const bank = {
    "t-shirt blanc oversize": [
      "https://images.unsplash.com/photo-1520975916090-3105956dac38",
      "https://images.unsplash.com/photo-1523381210434-271e8be1f52b"
    ],
    "jean bleu loose": [
      "https://images.unsplash.com/photo-1473966968600-fa801b869a1a",
      "https://images.unsplash.com/photo-1506629905607-d9c297d8e73c"
    ],
    "sneakers blanches": [
      "https://images.unsplash.com/photo-1549298916-b41d501d3772",
      "https://images.unsplash.com/photo-1600269452121-4f2416e55c28"
    ],
    "watch minimal silver": [
      "https://images.unsplash.com/photo-1522312346375-d1a52e2b99b3"
    ]
  };

  const list = bank[value?.toLowerCase()] || [
    "https://images.unsplash.com/photo-1520975916090-3105956dac38"
  ];

  return list[Math.floor(Math.random() * list.length)] + "?auto=format&fit=crop&w=800&q=80";
}

async function generateOutfit() {

  const result = document.getElementById("result");
  result.innerHTML = "⏳ IA en cours...";

  const res = await fetch("/api/generate-outfit", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({})
  });

  const data = await res.json();

  if (!data.outfit) {
    result.innerHTML = "❌ erreur IA";
    console.log(data);
    return;
  }

  const o = data.outfit;

  const items = [
    { t: "Style", v: o.style, i: getImage("style", o.top) },
    { t: "Top", v: o.top, i: getImage("top", o.top) },
    { t: "Bottom", v: o.bottom, i: getImage("bottom", o.bottom) },
    { t: "Shoes", v: o.shoes, i: getImage("shoes", o.shoes) },
    { t: "Accessories", v: o.accessories, i: getImage("acc", o.accessories) }
  ];

  result.innerHTML = "";

  items.forEach((item, i) => {
    setTimeout(() => {
      const div = document.createElement("div");
      div.className = "card";
      div.innerHTML = `
        <img src="${item.i}">
        <h3>${item.t}</h3>
        <p>${item.v}</p>
      `;
      result.appendChild(div);
    }, i * 120);
  });

}

</script>

</body>
</html>
