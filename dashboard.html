<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>MKAI Stylist AI</title>

<style>
body {
  margin: 0;
  font-family: system-ui;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: white;
  padding: 30px;
}

.container {
  max-width: 1000px;
  margin: auto;
}

h1 {
  font-size: 44px;
  background: linear-gradient(90deg,#60a5fa,#a78bfa,#f472b6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.subtitle {
  opacity: 0.7;
  margin-bottom: 20px;
}

button {
  background: linear-gradient(90deg,#3b82f6,#a855f7);
  border: none;
  padding: 14px 18px;
  border-radius: 12px;
  color: white;
  font-weight: bold;
  cursor: pointer;
  margin-bottom: 20px;
}

.preview {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-top: 10px;
}

.preview img {
  width: 80px;
  height: 80px;
  border-radius: 10px;
  object-fit: cover;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px,1fr));
  gap: 15px;
}

.card {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  padding: 12px;
  border-radius: 16px;
  animation: fade 0.3s ease;
}

.card img {
  width: 100%;
  height: 220px;
  object-fit: cover;
  border-radius: 12px;
  margin-bottom: 10px;
}

@keyframes fade {
  from {opacity:0; transform: translateY(10px);}
  to {opacity:1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="container">

<h1>🧠 MKAI Stylist AI</h1>
<div class="subtitle">Outfits cohérents + matching couleurs</div>

<input type="file" id="upload" multiple>
<div class="preview" id="preview"></div>

<button onclick="generateOutfit()">✨ Générer outfit cohérent</button>

<div id="result" class="grid"></div>

</div>

<script>

let uploadedImages = [];

document.getElementById("upload").addEventListener("change", (e) => {
  const preview = document.getElementById("preview");
  preview.innerHTML = "";
  uploadedImages = [];

  [...e.target.files].forEach(file => {
    const url = URL.createObjectURL(file);
    uploadedImages.push(file);

    const img = document.createElement("img");
    img.src = url;
    preview.appendChild(img);
  });
});


// 🧠 IMAGES INTELLIGENTES COHÉRENTES
function getImage(keywords) {

  const base = "https://source.unsplash.com/800x800/?fashion,";

  const clean = (keywords || "outfit")
    .toLowerCase()
    .replace(/,/g, " ")
    .split(" ")
    .slice(0, 6)
    .join(",");

  return base + clean + "&sig=" + Math.random();
}


async function generateOutfit() {

  const result = document.getElementById("result");
  result.innerHTML = "⏳ Création tenue cohérente...";

  try {

    const res = await fetch("/api/generate-outfit", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        style: "streetwear",
        weather: "soleil",
        gender: "homme",
        hasWardrobe: uploadedImages.length > 0
      })
    });

    const data = await res.json();

    if (!res.ok || !data.outfit) {
      result.innerHTML = "❌ Erreur IA";
      console.log(data);
      return;
    }

    const o = data.outfit;

    const items = [
      { t: "Style global", v: o.style_global, i: getImage(o.style_global + " outfit") },
      { t: "Couleur thème", v: o.color_theme, i: getImage(o.color_theme) },

      { t: "Haut", v: o.haut, i: getImage(o.haut_keywords) },
      { t: "Bas", v: o.bas, i: getImage(o.bas_keywords) },
      { t: "Chaussures", v: o.chaussures, i: getImage(o.shoes_keywords) },
      { t: "Accessoires", v: o.accessoires?.join(", "), i: getImage(o.acc_keywords) },

      { t: "Description", v: o.description, i: getImage(o.style_global) }
    ];

    result.innerHTML = "";

    items.forEach((item, i) => {
      setTimeout(() => {
        const div = document.createElement("div");
        div.className = "card";
        div.innerHTML = `
          <img src="${item.i}">
          <h3>${item.t}</h3>
          <p>${item.v || ""}</p>
        `;
        result.appendChild(div);
      }, i * 120);
    });

  } catch (e) {
    console.log(e);
    result.innerHTML = "❌ Erreur serveur";
  }
}

</script>

</body>
</html>
