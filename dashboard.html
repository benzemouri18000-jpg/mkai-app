<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>AI Vision Stylist</title>

<style>
body {
  margin: 0;
  font-family: system-ui;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: white;
  padding: 30px;
}

.container { max-width: 900px; margin: auto; }

h1 {
  font-size: 42px;
  background: linear-gradient(90deg,#60a5fa,#a78bfa,#f472b6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.card {
  background: rgba(255,255,255,0.06);
  padding: 14px;
  border-radius: 16px;
  margin-top: 15px;
}

.preview {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}

.preview img {
  width: 80px;
  height: 80px;
  object-fit: cover;
  border-radius: 10px;
}

button {
  margin-top: 10px;
  background: linear-gradient(90deg,#3b82f6,#a855f7);
  border: none;
  padding: 12px;
  border-radius: 12px;
  color: white;
  cursor: pointer;
}
</style>

</head>

<body>

<div class="container">

<h1>🧠 AI Vision Stylist</h1>

<p>Upload tes vêtements (IA les comprend vraiment)</p>

<input type="file" id="upload" multiple>
<div class="preview" id="preview"></div>

<button onclick="generate()">🎯 Générer tenue IA</button>

<div id="result"></div>

</div>

<script>

let images = [];

// 📸 upload images réelles
document.getElementById("upload").addEventListener("change", (e) => {

  const preview = document.getElementById("preview");
  preview.innerHTML = "";
  images = [];

  [...e.target.files].forEach(file => {
    images.push(file);

    const img = document.createElement("img");
    img.src = URL.createObjectURL(file);
    preview.appendChild(img);
  });
});

// 🚀 génération IA vision
async function generate() {

  const result = document.getElementById("result");
  result.innerHTML = "⏳ analyse IA vision...";

  const base64Images = await Promise.all(
    images.map(file => toBase64(file))
  );

  const res = await fetch("/api/generate-outfit", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      images: base64Images,
      weather: "sunny"
    })
  });

  const data = await res.json();

  if (!data.outfit) {
    result.innerHTML = JSON.stringify(data, null, 2);
    return;
  }

  const o = data.outfit;

  result.innerHTML = `
    <div class="card">
      <h2>Outfit IA</h2>
      <p><b>Top:</b> ${o.top}</p>
      <p><b>Bottom:</b> ${o.bottom}</p>
      <p><b>Shoes:</b> ${o.shoes}</p>
      <p><b>Vibe:</b> ${o.vibe}</p>
    </div>
  `;
}

// 📦 convert image
function toBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

</script>

</body>
</html>
