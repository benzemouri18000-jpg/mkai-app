<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>AI Stylist App</title>

<style>

/* 🌌 BACKGROUND */
body {
  margin: 0;
  font-family: system-ui;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: white;
  overflow-x: hidden;
}

/* ✨ GLOW */
.bg {
  position: fixed;
  inset: 0;
  z-index: 0;
}

.glow1 {
  position: absolute;
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, rgba(99,102,241,0.25), transparent 60%);
  top: -150px;
  left: -150px;
  filter: blur(70px);
}

.glow2 {
  position: absolute;
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, rgba(236,72,153,0.20), transparent 60%);
  bottom: -150px;
  right: -150px;
  filter: blur(70px);
}

/* 📦 CONTAINER */
.container {
  position: relative;
  z-index: 2;
  max-width: 1000px;
  margin: auto;
  padding: 50px 25px;
}

/* 🧠 TITLE */
h1 {
  font-size: 52px;
  font-weight: 800;
  margin-bottom: 8px;
  background: linear-gradient(90deg,#60a5fa,#a78bfa,#f472b6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.subtitle {
  opacity: 0.7;
  margin-bottom: 25px;
}

/* 📤 INPUT */
input {
  margin-top: 10px;
  color: white;
}

/* 🎛 BUTTON */
button {
  margin-top: 15px;
  background: linear-gradient(90deg,#3b82f6,#a855f7);
  border: none;
  padding: 14px 20px;
  border-radius: 14px;
  color: white;
  font-weight: 600;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  transform: translateY(-2px);
}

/* 👕 PREVIEW */
.preview {
  display: flex;
  gap: 12px;
  margin-top: 15px;
}

.preview img {
  width: 80px;
  height: 80px;
  object-fit: cover;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.1);
}

/* 🧊 RESULT CARD */
.card {
  margin-top: 25px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 18px;
  padding: 18px;
  backdrop-filter: blur(12px);
  animation: fade 0.3s ease;
}

.card h2 {
  margin: 0 0 10px 0;
}

.card p {
  opacity: 0.8;
  margin: 6px 0;
}

/* ✨ ANIMATION */
@keyframes fade {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

</style>
</head>

<body>

<div class="bg">
  <div class="glow1"></div>
  <div class="glow2"></div>
</div>

<div class="container">

<h1>🧠 AI Stylist</h1>
<div class="subtitle">Ton assistant mode intelligent (20–25 ans vibe)</div>

<input type="file" id="upload" multiple>

<div class="preview" id="preview"></div>

<button onclick="generate()">✨ Générer tenue</button>

<div id="result"></div>

</div>

<script>

let wardrobe = [];

/* 📸 UPLOAD */
document.getElementById("upload").addEventListener("change", (e) => {

  const preview = document.getElementById("preview");
  preview.innerHTML = "";
  wardrobe = [];

  [...e.target.files].forEach(file => {
    wardrobe.push(file.name);

    const img = document.createElement("img");
    img.src = URL.createObjectURL(file);
    preview.appendChild(img);
  });
});

/* 🌦️ WEATHER SIMPLE */
function getWeather() {
  const h = new Date().getHours();
  if (h < 10) return "morning cold";
  if (h < 18) return "sunny";
  return "evening cool";
}

/* 🚀 GENERATE OUTFIT */
async function generate() {

  const result = document.getElementById("result");
  result.innerHTML = "⏳ génération IA...";

  const res = await fetch("/api/generate-outfit", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      wardrobe,
      weather: getWeather()
    })
  });

  const data = await res.json();

  if (!data.outfit) {
    result.innerHTML = "❌ erreur IA";
    console.log(data);
    return;
  }

  const o = data.outfit;

  result.innerHTML = `
    <div class="card">
      <h2>${o.style}</h2>
      <p><b>Top:</b> ${o.top}</p>
      <p><b>Bottom:</b> ${o.bottom}</p>
      <p><b>Shoes:</b> ${o.shoes}</p>
      <p><b>Accessories:</b> ${o.accessories}</p>
      <p><b>Vibe:</b> ${o.vibe}</p>
    </div>
  `;
}

</script>

</body>
</html>
