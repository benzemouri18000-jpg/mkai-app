<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>MKAI Stylist</title>

<style>
body {
  margin: 0;
  font-family: system-ui;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: white;
  padding: 30px;
}

.container {
  max-width: 1000px;
  margin: auto;
}

h1 {
  font-size: 44px;
  background: linear-gradient(90deg,#60a5fa,#a78bfa,#f472b6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

button {
  background: linear-gradient(90deg,#3b82f6,#a855f7);
  border: none;
  padding: 14px 18px;
  border-radius: 12px;
  color: white;
  font-weight: bold;
  cursor: pointer;
  margin-bottom: 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px,1fr));
  gap: 15px;
}

.card {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  padding: 12px;
  border-radius: 16px;
  transition: 0.2s;
}

.card:hover {
  transform: translateY(-5px);
}

.card img {
  width: 100%;
  height: 220px;
  object-fit: cover;
  border-radius: 12px;
}
</style>
</head>

<body>

<div class="container">

<h1>🧠 MKAI Fashion AI</h1>

<button onclick="generateOutfit()">✨ Générer outfit</button>

<div id="result" class="grid"></div>

</div>

<script>

// 🎯 images STYLE JEUNE 20–25 ans (pas répétitives)
function getImage(type) {

  const bank = {
    haut: [
      "https://images.unsplash.com/photo-1520975916090-3105956dac38",
      "https://images.unsplash.com/photo-1523381210434-271e8be1f52b",
      "https://images.unsplash.com/photo-1503342394128-c104d54dba01"
    ],
    bas: [
      "https://images.unsplash.com/photo-1473966968600-fa801b869a1a",
      "https://images.unsplash.com/photo-1506629905607-d9c297d8e73c",
      "https://images.unsplash.com/photo-1542272604-787c3835535d"
    ],
    shoes: [
      "https://images.unsplash.com/photo-1549298916-b41d501d3772",
      "https://images.unsplash.com/photo-1600269452121-4f2416e55c28",
      "https://images.unsplash.com/photo-1528701800489-20be3c2ea1f2"
    ],
    acc: [
      "https://images.unsplash.com/photo-1511499767150-a48a237f3871",
      "https://images.unsplash.com/photo-1522312346375-d1a52e2b99b3"
    ]
  };

  const list = bank[type] || bank.haut;

  return list[Math.floor(Math.random() * list.length)] + "?auto=format&fit=crop&w=800&q=80";
}

async function generateOutfit() {

  const result = document.getElementById("result");
  result.innerHTML = "⏳ création outfit stylé...";

  const res = await fetch("/api/generate-outfit", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      style: "streetwear",
      weather: "sunny",
      gender: "male"
    })
  });

  const data = await res.json();

  if (!data.outfit) {
    result.innerHTML = "Erreur IA";
    return;
  }

  const o = data.outfit;

  const items = [
    { t: "Style", v: o.style_global, i: getImage("haut") },
    { t: "Haut", v: o.haut, i: getImage("haut") },
    { t: "Bas", v: o.bas, i: getImage("bas") },
    { t: "Shoes", v: o.shoes, i: getImage("shoes") },
    { t: "Accessoires", v: o.accessories, i: getImage("acc") }
  ];

  result.innerHTML = "";

  items.forEach((item, i) => {
    setTimeout(() => {
      const div = document.createElement("div");
      div.className = "card";
      div.innerHTML = `
        <img src="${item.i}">
        <h3>${item.t}</h3>
        <p>${item.v}</p>
      `;
      result.appendChild(div);
    }, i * 120);
  });

}

</script>

</body>
</html>
