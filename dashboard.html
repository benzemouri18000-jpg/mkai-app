<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>AI Stylist Pro</title>

<style>
body {
  margin: 0;
  font-family: system-ui;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: white;
  padding: 30px;
}

.container { max-width: 1000px; margin: auto; }

h1 {
  font-size: 44px;
  background: linear-gradient(90deg,#60a5fa,#a78bfa,#f472b6);
  -webkit-background-clip: text;
}

.card {
  background: rgba(255,255,255,0.06);
  border-radius: 16px;
  padding: 12px;
  margin-top: 15px;
}

button {
  background: linear-gradient(90deg,#3b82f6,#a855f7);
  border: none;
  padding: 14px;
  border-radius: 12px;
  color: white;
  cursor: pointer;
  margin-top: 10px;
}

input {
  margin-top: 10px;
  color: white;
}

.preview img {
  width: 80px;
  height: 80px;
  object-fit: cover;
  border-radius: 10px;
  margin-right: 5px;
}
</style>

</head>

<body>

<div class="container">

<h1>🧠 AI Stylist Next Level</h1>

<p>Météo actuelle + dressing + IA styliste</p>

<input type="file" id="upload" multiple>
<div class="preview" id="preview"></div>

<button onclick="generate()">🎯 Générer tenue du jour</button>

<div id="result"></div>

</div>

<script>

let wardrobe = [];

// 📸 upload dressing
document.getElementById("upload").addEventListener("change", (e) => {
  const preview = document.getElementById("preview");
  preview.innerHTML = "";
  wardrobe = [];

  [...e.target.files].forEach(file => {
    wardrobe.push(file.name);

    const img = document.createElement("img");
    img.src = URL.createObjectURL(file);
    preview.appendChild(img);
  });
});

// 🌦️ météo simple (fallback local)
function getWeather() {
  const hour = new Date().getHours();
  if (hour < 10) return "cold morning";
  if (hour < 18) return "sunny day";
  return "cool evening";
}

async function generate() {

  const res = await fetch("/api/generate-outfit", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      weather: getWeather(),
      wardrobe
    })
  });

  const data = await res.json();

  const o = data.outfit;

  document.getElementById("result").innerHTML = `
    <div class="card">
      <h2>${o.style}</h2>
      <p><b>Top:</b> ${o.top}</p>
      <p><b>Bottom:</b> ${o.bottom}</p>
      <p><b>Shoes:</b> ${o.shoes}</p>
      <p><b>Accessories:</b> ${o.accessories}</p>
      <p><b>Vibe:</b> ${o.vibe}</p>
    </div>
  `;
}

</script>

</body>
</html>
