<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>MKAI Stylist AI</title>

<style>
body {
  margin: 0;
  font-family: system-ui;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: white;
  padding: 30px;
}

.container {
  max-width: 1000px;
  margin: auto;
}

h1 {
  font-size: 44px;
  background: linear-gradient(90deg,#60a5fa,#a78bfa,#f472b6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.subtitle {
  opacity: 0.7;
  margin-bottom: 20px;
}

button {
  background: linear-gradient(90deg,#3b82f6,#a855f7);
  border: none;
  padding: 14px 18px;
  border-radius: 12px;
  color: white;
  font-weight: bold;
  cursor: pointer;
  margin-bottom: 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px,1fr));
  gap: 15px;
}

.card {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  padding: 12px;
  border-radius: 16px;
  animation: fade 0.3s ease;
}

.card img {
  width: 100%;
  height: 220px;
  object-fit: cover;
  border-radius: 12px;
  margin-bottom: 10px;
}

@keyframes fade {
  from {opacity:0; transform: translateY(10px);}
  to {opacity:1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="container">

<h1>🧠 MKAI Stylist AI</h1>
<div class="subtitle">IA mode stylist cohérent</div>

<button onclick="generateOutfit()">✨ Générer outfit</button>

<div id="result" class="grid"></div>

</div>

<script>

// 🎯 IMAGES FIABLES (mapping FIXE = cohérence garantie)
function getImage(value) {

  const map = {
    "t-shirt blanc": "https://images.unsplash.com/photo-1520975916090-3105956dac38",
    "t-shirt noir": "https://images.unsplash.com/photo-1523381210434-271e8be1f52b",
    "jean noir": "https://images.unsplash.com/photo-1506629905607-d9c297d8e73c",
    "jean bleu": "https://images.unsplash.com/photo-1473966968600-fa801b869a1a",
    "sneakers blanches": "https://images.unsplash.com/photo-1549298916-b41d501d3772",
    "sneakers noires": "https://images.unsplash.com/photo-1600269452121-4f2416e55c28",
    "watch": "https://images.unsplash.com/photo-1522312346375-d1a52e2b99b3",
    "cap": "https://images.unsplash.com/photo-1511499767150-a48a237f3871"
  };

  return map[value?.toLowerCase()] || "https://images.unsplash.com/photo-1520975916090-3105956dac38";
}

async function generateOutfit() {

  const result = document.getElementById("result");
  result.innerHTML = "⏳ IA en cours...";

  try {

    const res = await fetch("/api/generate-outfit", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        style: "streetwear",
        weather: "soleil",
        gender: "homme"
      })
    });

    const data = await res.json();

    if (!res.ok || !data.outfit) {
      result.innerHTML = "❌ Erreur IA";
      console.log(data);
      return;
    }

    const o = data.outfit;

    const items = [
      { t: "Style", v: o.style_global || "modern", i: getImage("t-shirt blanc") },
      { t: "Haut", v: o.haut, i: getImage(o.haut) },
      { t: "Bas", v: o.bas, i: getImage(o.bas) },
      { t: "Shoes", v: o.shoes, i: getImage(o.shoes) },
      { t: "Accessoires", v: o.accessories, i: getImage(o.accessories) }
    ];

    result.innerHTML = "";

    items.forEach((item, i) => {
      setTimeout(() => {
        const div = document.createElement("div");
        div.className = "card";
        div.innerHTML = `
          <img src="${item.i}">
          <h3>${item.t}</h3>
          <p>${item.v || ""}</p>
        `;
        result.appendChild(div);
      }, i * 120);
    });

  } catch (e) {
    console.log(e);
    result.innerHTML = "❌ Erreur serveur";
  }
}

</script>

</body>
</html>
