<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>AI Outfit Auto</title>

<style>

body {
  margin: 0;
  font-family: system-ui;
  background: #050816;
  color: white;
}

/* HEADER */
.header {
  padding: 25px;
  text-align: center;
}

h1 {
  margin: 0;
  font-size: 32px;
  background: linear-gradient(90deg,#60a5fa,#a78bfa,#f472b6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.subtitle {
  opacity: 0.6;
}

/* UPLOAD */
.box {
  margin: 20px auto;
  max-width: 600px;
  background: rgba(255,255,255,0.05);
  padding: 20px;
  border-radius: 16px;
  border: 1px solid rgba(255,255,255,0.1);
}

.preview {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}

.preview img {
  width: 70px;
  height: 70px;
  object-fit: cover;
  border-radius: 10px;
}

/* CARD OUTFIT */
.card {
  margin: 20px auto;
  max-width: 600px;
  background: rgba(255,255,255,0.06);
  padding: 18px;
  border-radius: 16px;
  border: 1px solid rgba(255,255,255,0.1);
}

.badge {
  display: inline-block;
  padding: 5px 10px;
  background: rgba(168,85,247,0.3);
  border-radius: 999px;
  font-size: 12px;
  margin-bottom: 10px;
}

</style>

</head>

<body>

<div class="header">
  <h1>🧠 AI Outfit Daily</h1>
  <div class="subtitle">Ta tenue générée automatiquement chaque jour</div>
</div>

<div class="box">
  <input type="file" id="upload" multiple>
  <div class="preview" id="preview"></div>
</div>

<div id="result" class="card">
  ⏳ Chargement tenue du jour...
</div>

<script>

let wardrobe = [];

/* -------------------------
   SAVE UPLOAD (LOCAL)
--------------------------*/
document.getElementById("upload").addEventListener("change", (e) => {

  const preview = document.getElementById("preview");
  preview.innerHTML = "";
  wardrobe = [];

  [...e.target.files].forEach(file => {

    wardrobe.push(file.name);

    const img = document.createElement("img");
    img.src = URL.createObjectURL(file);
    preview.appendChild(img);
  });

  localStorage.setItem("wardrobe", JSON.stringify(wardrobe));

  generateOutfit(); // auto refresh
});

/* -------------------------
   LOAD SAVED WARDROBE
--------------------------*/
function loadWardrobe() {
  const saved = localStorage.getItem("wardrobe");
  if (saved) {
    wardrobe = JSON.parse(saved);
  }
}

/* -------------------------
   AUTO GENERATION
--------------------------*/
window.addEventListener("load", () => {
  loadWardrobe();
  generateOutfit();
});

/* -------------------------
   WEATHER SIMPLE
--------------------------*/
function getWeather() {
  const h = new Date().getHours();
  if (h < 10) return "morning cold";
  if (h < 18) return "sunny";
  return "evening cool";
}

/* -------------------------
   IA CALL AUTO
--------------------------*/
async function generateOutfit() {

  const result = document.getElementById("result");
  result.innerHTML = "⏳ IA génère ta tenue du jour...";

  const res = await fetch("/api/generate-outfit", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      wardrobe,
      weather: getWeather()
    })
  });

  const data = await res.json();

  if (!data.outfit) {
    result.innerHTML = "❌ erreur IA";
    console.log(data);
    return;
  }

  const o = data.outfit;

  result.innerHTML = `
    <div class="badge">OUTFIT DU JOUR</div>
    <h2>${o.style}</h2>
    <p><b>Top:</b> ${o.top}</p>
    <p><b>Bottom:</b> ${o.bottom}</p>
    <p><b>Shoes:</b> ${o.shoes}</p>
    <p><b>Accessories:</b> ${o.accessories}</p>
    <p><b>Vibe:</b> ${o.vibe}</p>
  `;
}

</script>

</body>
</html>
