<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>AI Fashion Studio</title>

<style>

/* 🌌 GLOBAL */
body {
  margin: 0;
  font-family: Inter, system-ui;
  background: #050816;
  color: white;
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* 🧊 SIDEBAR */
.sidebar {
  width: 260px;
  background: rgba(255,255,255,0.03);
  border-right: 1px solid rgba(255,255,255,0.06);
  padding: 20px;
  backdrop-filter: blur(20px);
}

.logo {
  font-size: 20px;
  font-weight: 800;
  background: linear-gradient(90deg,#60a5fa,#a78bfa,#f472b6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 30px;
}

.menu {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.menu div {
  padding: 10px;
  border-radius: 10px;
  opacity: 0.7;
}

/* 📦 MAIN */
.main {
  flex: 1;
  padding: 30px;
  overflow-y: auto;
}

/* 🧠 HEADER */
h1 {
  font-size: 34px;
  margin: 0;
}

.subtitle {
  opacity: 0.6;
  margin-bottom: 20px;
}

/* 📤 UPLOAD */
.uploadBox {
  border: 1px dashed rgba(255,255,255,0.2);
  padding: 20px;
  border-radius: 16px;
  margin-bottom: 15px;
  background: rgba(255,255,255,0.02);
}

/* 👕 PREVIEW */
.preview {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}

.preview img {
  width: 70px;
  height: 70px;
  border-radius: 10px;
  object-fit: cover;
}

/* 🎛 BUTTON */
button {
  background: linear-gradient(90deg,#3b82f6,#a855f7);
  border: none;
  padding: 12px 16px;
  border-radius: 12px;
  color: white;
  cursor: pointer;
  margin-top: 10px;
}

/* 🧊 RESULT GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 15px;
  margin-top: 20px;
}

/* CARD ULTRA PRO */
.card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  padding: 15px;
  border-radius: 16px;
  backdrop-filter: blur(20px);
  transition: 0.2s;
}

.card:hover {
  transform: translateY(-5px);
  border-color: rgba(168,85,247,0.4);
}

.card h3 {
  margin: 0 0 5px 0;
}

.card p {
  opacity: 0.7;
  font-size: 13px;
}

</style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="logo">AI Fashion</div>

  <div class="menu">
    <div>👕 Dressing</div>
    <div>✨ Outfit IA</div>
    <div>🔥 Inspirations</div>
    <div>⚙️ Settings</div>
  </div>
</div>

<!-- MAIN -->
<div class="main">

<h1>Ton styliste IA</h1>
<div class="subtitle">Outfits 20–25 ans / TikTok / Pinterest vibe</div>

<div class="uploadBox">
  <input type="file" id="upload" multiple>
  <div class="preview" id="preview"></div>
</div>

<button onclick="generate()">Générer outfit</button>

<div class="grid" id="result"></div>

</div>

<script>

let wardrobe = [];

// upload
document.getElementById("upload").addEventListener("change", (e) => {

  const preview = document.getElementById("preview");
  preview.innerHTML = "";
  wardrobe = [];

  [...e.target.files].forEach(file => {
    wardrobe.push(file.name);

    const img = document.createElement("img");
    img.src = URL.createObjectURL(file);
    preview.appendChild(img);
  });
});

// weather
function weather() {
  return "sunny";
}

// generate
async function generate() {

  const res = await fetch("/api/generate-outfit", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      wardrobe,
      weather: weather()
    })
  });

  const data = await res.json();

  if (!data.outfit) return;

  const o = data.outfit;

  const result = document.getElementById("result");

  result.innerHTML = `
    <div class="card">
      <h3>${o.style}</h3>
      <p>${o.top}</p>
      <p>${o.bottom}</p>
      <p>${o.shoes}</p>
      <p>${o.accessories}</p>
    </div>
  `;
}

</script>

</body>
</html>
