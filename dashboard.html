<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>AI Stylist</title>

<style>
body {
  margin:0;
  font-family: system-ui;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color:white;
  padding:30px;
}

.container {
  max-width:900px;
  margin:auto;
}

h1 {
  font-size:40px;
  background: linear-gradient(90deg,#60a5fa,#a78bfa,#f472b6);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.card {
  background: rgba(255,255,255,0.06);
  padding:15px;
  border-radius:16px;
  margin-top:15px;
}

button {
  background:#7c3aed;
  border:none;
  padding:12px 16px;
  color:white;
  border-radius:12px;
  cursor:pointer;
}

.badge {
  display:inline-block;
  padding:5px 10px;
  background:#1f2937;
  border-radius:10px;
  margin-top:5px;
}
</style>

</head>

<body>

<div class="container">

<h1>🧠 AI Stylist</h1>

<button onclick="getOutfit()">🎯 Tenue du jour</button>

<div id="outfit"></div>

</div>

<script>

async function getOutfit() {

  const res = await fetch("/api/generate-outfit", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      weather: "auto",
      style: "streetwear",
      wardrobe: ["t-shirt blanc", "jean noir", "sneakers"]
    })
  });

  const data = await res.json();

  const o = data.outfit;

  document.getElementById("outfit").innerHTML = `
    <div class="card">
      <h2>${o.style}</h2>
      <div class="badge">Top: ${o.top.name} - ${o.top.color}</div><br>
      <div class="badge">Bottom: ${o.bottom.name} - ${o.bottom.color}</div><br>
      <div class="badge">Shoes: ${o.shoes.name} - ${o.shoes.color}</div><br>
      <div class="badge">Vibe: ${o.vibe}</div>
    </div>
  `;
}

</script>

</body>
</html>
