<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>MKAI Fashion AI</title>

<style>
body {
  margin: 0;
  font-family: system-ui;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: white;
  padding: 30px;
}

.container { max-width: 1000px; margin: auto; }

h1 {
  font-size: 44px;
  background: linear-gradient(90deg,#60a5fa,#a78bfa,#f472b6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

button {
  background: linear-gradient(90deg,#3b82f6,#a855f7);
  border: none;
  padding: 14px 18px;
  border-radius: 12px;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px,1fr));
  gap: 15px;
}

.card {
  background: rgba(255,255,255,0.06);
  border-radius: 16px;
  padding: 12px;
}

.card img {
  width: 100%;
  height: 220px;
  object-fit: cover;
  border-radius: 12px;
}
</style>
</head>

<body>

<div class="container">

<h1>🧠 MKAI Fashion AI</h1>

<button onclick="generateOutfit()">Générer outfit</button>

<div id="result" class="grid"></div>

</div>

<script>

// 🎯 IMAGE MATCH EXACT (IMPORTANT)
function getImage(type, color) {

  const base = "https://source.unsplash.com/800x800/?fashion,";

  return base + type + "," + color + "&sig=" + Math.random();
}

async function generateOutfit() {

  const result = document.getElementById("result");
  result.innerHTML = "⏳ IA...";

  const res = await fetch("/api/generate-outfit", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({})
  });

  const data = await res.json();

  if (!data.outfit) {
    result.innerHTML = "Erreur";
    return;
  }

  const o = data.outfit;

  const items = [
    {
      t: "Top",
      v: `${o.top.item} ${o.top.color} ${o.top.brand}`,
      i: getImage(o.top.item, o.top.color)
    },
    {
      t: "Bottom",
      v: `${o.bottom.item} ${o.bottom.color} ${o.bottom.brand}`,
      i: getImage(o.bottom.item, o.bottom.color)
    },
    {
      t: "Shoes",
      v: `${o.shoes.item} ${o.shoes.color} ${o.shoes.brand}`,
      i: getImage("sneakers", o.shoes.color)
    },
    {
      t: "Accessories",
      v: `${o.accessories.item} ${o.accessories.color}`,
      i: getImage(o.accessories.item, o.accessories.color)
    }
  ];

  result.innerHTML = "";

  items.forEach((item, i) => {
    setTimeout(() => {
      const div = document.createElement("div");
      div.className = "card";
      div.innerHTML = `
        <img src="${item.i}">
        <h3>${item.t}</h3>
        <p>${item.v}</p>
      `;
      result.appendChild(div);
    }, i * 120);
  });

}

</script>

</body>
</html>
