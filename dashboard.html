<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>MKAI Fashion AI</title>

<style>
body {
  margin: 0;
  font-family: system-ui;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: white;
  overflow-x: hidden;
}

/* glow background */
body::before {
  content: "";
  position: fixed;
  top: -200px;
  left: -200px;
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(168,85,247,0.25), transparent 60%);
  filter: blur(80px);
}

body::after {
  content: "";
  position: fixed;
  bottom: -200px;
  right: -200px;
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(59,130,246,0.25), transparent 60%);
  filter: blur(80px);
}

.container {
  max-width: 1100px;
  margin: auto;
  padding: 40px;
  position: relative;
  z-index: 2;
}

h1 {
  font-size: 48px;
  font-weight: 800;
  background: linear-gradient(90deg,#60a5fa,#a78bfa,#f472b6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 10px;
}

.subtitle {
  opacity: 0.7;
  margin-bottom: 30px;
}

/* button */
button {
  background: linear-gradient(90deg,#3b82f6,#a855f7);
  border: none;
  padding: 14px 22px;
  border-radius: 14px;
  color: white;
  font-weight: 600;
  cursor: pointer;
  transition: 0.3s;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

button:hover {
  transform: translateY(-2px);
  box-shadow: 0 15px 40px rgba(0,0,0,0.4);
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px,1fr));
  gap: 18px;
  margin-top: 30px;
}

/* CARD STYLE PREMIUM */
.card {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 18px;
  padding: 14px;
  backdrop-filter: blur(12px);
  transition: 0.3s;
  position: relative;
  overflow: hidden;
}

.card:hover {
  transform: translateY(-6px);
  border-color: rgba(168,85,247,0.4);
  box-shadow: 0 20px 60px rgba(0,0,0,0.4);
}

/* image */
.card img {
  width: 100%;
  height: 240px;
  object-fit: cover;
  border-radius: 14px;
  margin-bottom: 12px;
  transition: 0.3s;
}

.card:hover img {
  transform: scale(1.03);
}

/* title */
.card h3 {
  margin: 0;
  font-size: 16px;
  font-weight: 700;
}

/* text */
.card p {
  opacity: 0.75;
  font-size: 13px;
  margin-top: 6px;
  line-height: 1.4;
}

/* loader */
.loader {
  opacity: 0.6;
  font-size: 16px;
  padding: 20px;
}
</style>
</head>

<body>

<div class="container">

<h1>🧠 MKAI Fashion AI</h1>
<div class="subtitle">Ton styliste IA personnel — outfits 20–25 ans</div>

<button onclick="generateOutfit()">✨ Générer une tenue</button>

<div id="result" class="grid"></div>

</div>

<script>

function getImage(value) {

  const bank = {
    "t-shirt blanc oversize": [
      "https://images.unsplash.com/photo-1520975916090-3105956dac38",
      "https://images.unsplash.com/photo-1523381210434-271e8be1f52b"
    ],
    "jean bleu loose": [
      "https://images.unsplash.com/photo-1473966968600-fa801b869a1a",
      "https://images.unsplash.com/photo-1506629905607-d9c297d8e73c"
    ],
    "sneakers blanches": [
      "https://images.unsplash.com/photo-1549298916-b41d501d3772",
      "https://images.unsplash.com/photo-1600269452121-4f2416e55c28"
    ],
    "watch minimal silver": [
      "https://images.unsplash.com/photo-1522312346375-d1a52e2b99b3"
    ]
  };

  const list = bank[value?.toLowerCase()] || [
    "https://images.unsplash.com/photo-1520975916090-3105956dac38"
  ];

  return list[Math.floor(Math.random() * list.length)] + "?auto=format&fit=crop&w=900&q=80";
}

async function generateOutfit() {

  const result = document.getElementById("result");
  result.innerHTML = `<div class="loader">⏳ Création de ta tenue...</div>`;

  const res = await fetch("/api/generate-outfit", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({})
  });

  const data = await res.json();

  if (!data.outfit) {
    result.innerHTML = "❌ erreur IA";
    console.log(data);
    return;
  }

  const o = data.outfit;

  const items = [
    { t: "Style", v: o.style, i: getImage(o.top) },
    { t: "Haut", v: o.top, i: getImage(o.top) },
    { t: "Bas", v: o.bottom, i: getImage(o.bottom) },
    { t: "Chaussures", v: o.shoes, i: getImage(o.shoes) },
    { t: "Accessoires", v: o.accessories, i: getImage(o.accessories) }
  ];

  result.innerHTML = "";

  items.forEach((item, i) => {
    setTimeout(() => {
      const div = document.createElement("div");
      div.className = "card";
      div.innerHTML = `
        <img src="${item.i}">
        <h3>${item.t}</h3>
        <p>${item.v}</p>
      `;
      result.appendChild(div);
    }, i * 120);
  });

}

</script>

</body>
</html>
