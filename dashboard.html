<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>MKAI Stylist</title>

<style>
body {
  margin: 0;
  font-family: system-ui;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: white;
  padding: 30px;
}

.container {
  max-width: 1000px;
  margin: auto;
}

h1 {
  font-size: 44px;
  background: linear-gradient(90deg,#60a5fa,#a78bfa,#f472b6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.subtitle {
  opacity: 0.7;
  margin-bottom: 20px;
}

button {
  background: linear-gradient(90deg,#3b82f6,#a855f7);
  border: none;
  padding: 14px 18px;
  border-radius: 12px;
  color: white;
  font-weight: bold;
  cursor: pointer;
  margin-bottom: 20px;
}

button:hover {
  opacity: 0.9;
}

.preview {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-top: 10px;
}

.preview img {
  width: 80px;
  height: 80px;
  border-radius: 10px;
  object-fit: cover;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px,1fr));
  gap: 15px;
  margin-top: 20px;
}

.card {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  padding: 12px;
  border-radius: 16px;
  backdrop-filter: blur(12px);
  animation: fade 0.4s ease;
}

.card img {
  width: 100%;
  height: 220px;
  object-fit: cover;
  border-radius: 12px;
  margin-bottom: 10px;
}

@keyframes fade {
  from {opacity:0; transform: translateY(10px);}
  to {opacity:1; transform: translateY(0);}
}

input {
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

<h1>🧠 MKAI Stylist AI</h1>
<div class="subtitle">IA fashion + outfits visuels</div>

<input type="file" id="upload" multiple>
<div class="preview" id="preview"></div>

<button onclick="generateOutfit()">✨ Générer outfit</button>

<div class="grid" id="result"></div>

</div>

<script>

let uploadedImages = [];

document.getElementById("upload").addEventListener("change", (e) => {
  const preview = document.getElementById("preview");
  preview.innerHTML = "";
  uploadedImages = [];

  [...e.target.files].forEach(file => {
    const url = URL.createObjectURL(file);
    uploadedImages.push(file);

    const img = document.createElement("img");
    img.src = url;
    preview.appendChild(img);
  });
});

// 🔥 IMAGES ULTRA FIABLES (CDN UNSPLASH DIRECT)
function img(type) {
  const base = "https://images.unsplash.com/photo-";

  const map = {
    haut: "1520975916090-3105956dac38",
    bas: "1473966968600-fa801b869a1a",
    shoes: "1549298916-b41d501d3772",
    acc: "1511499767150-a48a237f3871"
  };

  return base + map[type] + "?auto=format&fit=crop&w=800&q=80";
}

async function generateOutfit() {

  const res = await fetch("/api/generate-outfit", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      style: "streetwear",
      weather: "soleil",
      gender: "homme",
      hasWardrobe: uploadedImages.length > 0
    })
  });

  const data = await res.json();

  const o = data.outfit;
  const result = document.getElementById("result");

  if (!o) {
    result.innerHTML = "Erreur IA ❌";
    console.log(data);
    return;
  }

  result.innerHTML = "";

  const items = [
    { t: "Haut", v: o.haut, i: img("haut") },
    { t: "Bas", v: o.bas, i: img("bas") },
    { t: "Chaussures", v: o.chaussures, i: img("shoes") },
    { t: "Accessoires", v: o.accessoires?.join(", "), i: img("acc") }
  ];

  items.forEach((it, i) => {
    setTimeout(() => {
      const div = document.createElement("div");
      div.className = "card";
      div.innerHTML = `
        <img src="${it.i}">
        <h3>${it.t}</h3>
        <p>${it.v}</p>
      `;
      result.appendChild(div);
    }, i * 120);
  });
}

</script>

</body>
</html>
