<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>AI Stylist</title>

<style>
body {
  margin: 0;
  font-family: system-ui;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: white;
  padding: 30px;
}

.container {
  max-width: 900px;
  margin: auto;
}

h1 {
  font-size: 42px;
  background: linear-gradient(90deg,#60a5fa,#a78bfa,#f472b6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

input {
  margin-top: 10px;
}

button {
  margin-top: 10px;
  background: linear-gradient(90deg,#3b82f6,#a855f7);
  border: none;
  padding: 12px 16px;
  border-radius: 12px;
  color: white;
  cursor: pointer;
}

.preview {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}

.preview img {
  width: 70px;
  height: 70px;
  object-fit: cover;
  border-radius: 10px;
}

.card {
  background: rgba(255,255,255,0.06);
  padding: 14px;
  border-radius: 16px;
  margin-top: 15px;
}
</style>
</head>

<body>

<div class="container">

<h1>🧠 AI Stylist</h1>

<p>Upload tes vêtements + génération tenue IA</p>

<input type="file" id="upload" multiple>
<div class="preview" id="preview"></div>

<button onclick="generate()">🎯 Générer tenue du jour</button>

<div id="result"></div>

</div>

<script>

let wardrobe = [];

// 📸 upload vêtements
document.getElementById("upload").addEventListener("change", (e) => {

  const preview = document.getElementById("preview");
  preview.innerHTML = "";
  wardrobe = [];

  [...e.target.files].forEach(file => {
    wardrobe.push(file.name);

    const img = document.createElement("img");
    img.src = URL.createObjectURL(file);
    preview.appendChild(img);
  });
});

// 🌦️ météo simple
function getWeather() {
  const h = new Date().getHours();
  if (h < 10) return "morning cold";
  if (h < 18) return "sunny";
  return "evening cool";
}

// 🚀 génération IA
async function generate() {

  const result = document.getElementById("result");
  result.innerHTML = "⏳ IA en cours...";

  const res = await fetch("/api/generate-outfit", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      wardrobe,
      weather: getWeather()
    })
  });

  const data = await res.json();

  if (!data.outfit) {
    result.innerHTML = "❌ erreur IA";
    console.log(data);
    return;
  }

  const o = data.outfit;

  result.innerHTML = `
    <div class="card">
      <h2>${o.style}</h2>
      <p><b>Top:</b> ${o.top}</p>
      <p><b>Bottom:</b> ${o.bottom}</p>
      <p><b>Shoes:</b> ${o.shoes}</p>
      <p><b>Accessories:</b> ${o.accessories}</p>
      <p><b>Vibe:</b> ${o.vibe}</p>
    </div>
  `;
}

</script>

</body>
</html>
