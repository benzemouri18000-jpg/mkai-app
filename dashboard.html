<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>MKAI - AI Stylist</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg,#0f172a,#1e293b);
  color: white;
  padding: 30px;
}

.container {
  max-width: 900px;
  margin: auto;
}

h1 {
  font-size: 32px;
  margin-bottom: 10px;
}

.subtitle {
  opacity: 0.7;
  margin-bottom: 30px;
}

.card {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.1);
  padding: 15px;
  border-radius: 16px;
  backdrop-filter: blur(10px);
  margin-top: 10px;
  animation: fadeIn 0.4s ease;
}

@keyframes fadeIn {
  from {opacity:0; transform: translateY(10px);}
  to {opacity:1; transform: translateY(0);}
}

button {
  background: #3b82f6;
  border: none;
  padding: 12px 18px;
  border-radius: 10px;
  color: white;
  cursor: pointer;
  margin-top: 10px;
}

button:hover {
  background: #2563eb;
}

input {
  margin-top: 10px;
}

.preview {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-top: 10px;
}

.preview img {
  width: 90px;
  height: 90px;
  object-fit: cover;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.2);
}
</style>
</head>

<body>

<div class="container">

<h1>🧠 MKAI Stylist AI</h1>
<div class="subtitle">Upload tes vêtements et laisse l’IA créer tes outfits</div>

<!-- UPLOAD -->
<div class="card">
  <h3>📸 Ton dressing</h3>
  <input type="file" id="upload" multiple accept="image/*">
  <div class="preview" id="preview"></div>
</div>

<!-- BUTTON -->
<button onclick="generateOutfit()">🎯 Générer tenue IA</button>

<!-- RESULT -->
<div id="result"></div>

</div>

<script>
// --------------------
// PREVIEW IMAGES
// --------------------
const upload = document.getElementById("upload");
const preview = document.getElementById("preview");

upload.addEventListener("change", (e) => {
  preview.innerHTML = "";
  [...e.target.files].forEach(file => {
    const img = document.createElement("img");
    img.src = URL.createObjectURL(file);
    preview.appendChild(img);
  });
});

// --------------------
// IA CALL
// --------------------
async function generateOutfit() {

  const res = await fetch("/api/generate-outfit", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      style: "streetwear",
      weather: "soleil",
      gender: "homme"
    })
  });

  const data = await res.json();
  const outfit = data.outfit;

  const result = document.getElementById("result");
  result.innerHTML = "";

  const items = [
    { t: "Haut", v: outfit.haut },
    { t: "Bas", v: outfit.bas },
    { t: "Chaussures", v: outfit.chaussures },
    { t: "Accessoires", v: outfit.accessoires?.join(", ") },
    { t: "Description", v: outfit.description }
  ];

  items.forEach((item, i) => {
    setTimeout(() => {
      const div = document.createElement("div");
      div.className = "card";
      div.innerHTML = `<b>${item.t}</b><br>${item.v}`;
      result.appendChild(div);
    }, i * 120);
  });
}

</script>

</body>
</html>
